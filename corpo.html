<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão Start Fofo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff5f7; /* Fundo pastel super suave */
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estilo do botão */
        .btn-start {
            background-color: #ffb7b2; /* Rosa pastel */
            color: white;
            font-size: 26px;
            font-weight: bold;
            padding: 16px 45px;
            border: 3px solid #ffcad4; /* Borda fofinha */
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #ff9aa2; /* Sombra estilo 3D de joguinho */
            transition: all 0.1s ease;
            outline: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Efeito hover (passar o mouse) */
        .btn-start:hover {
            background-color: #ffcad4;
            transform: translateY(-2px);
            box-shadow: 0 10px 0px #ff9aa2;
        }

        /* Efeito active (clicar) */
        .btn-start:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #ff9aa2;
        }
    </style>
</head>
<body>

    <a href="https://www.google.com" target="_blank" style="text-decoration: none;">
        <button class="btn-start">🌸 START 🌸</button>
    </a>

</body>
</html>

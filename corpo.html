<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão Start Fofo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff5f7; /* Fundo pastel super suave */
            margin: 0;
            /* Aplicando a nova fonte aqui */
            font-family: "Fredoka", sans-serif;
        }

        /* O próprio link agora se comporta e se parece com o botão */
        .btn-start {
            display: inline-block;
            text-decoration: none;
            background-color: #ffb7b2; /* Rosa pastel */
            color: white;
            font-size: 28px; /* Aumentei um pouquinho para destacar a fonte */
            font-weight: 700; /* Deixa a fonte mais gordinha e fofa */
            padding: 14px 45px;
            border: 3px solid #ffcad4; /* Borda fofinha */
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #ff9aa2; /* Sombra estilo 3D de joguinho */
            transition: all 0.1s ease;
            outline: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            letter-spacing: 1px; /* Espaçamento leve entre as letras */
        }

        /* Efeito hover (passar o mouse) */
        .btn-start:hover {
            background-color: #ffcad4;
            transform: translateY(-2px);
            box-shadow: 0 10px 0px #ff9aa2;
        }

        /* Efeito active (clicar) */
        .btn-start:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #ff9aa2;
        }
    </style>
</head>
<body>

    <a href="https://www.google.com" target="_blank" class="btn-start">
        🌸 START 🌸
    </a>

</body>
</html>

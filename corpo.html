<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanrio Neapolitan Game</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --morango: #ffcad4;
            --baunilha: #fbf8cc;
            --chocolate: #ddb892;
            --bg: #fff5f7;
            --borda: #ff9aa2;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--bg);
            font-family: "Fredoka", sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Interface Inicial --- */
        #ui-container {
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn {
            font-family: "Comfortaa", sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: 4px solid var(--baunilha);
            cursor: pointer;
            box-shadow: 0 8px 0px var(--borda);
            transition: all 0.1s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .btn-start { background-color: var(--morango); }
        .btn-char { background-color: var(--chocolate); }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 0px var(--borda); }
        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0px var(--borda); }

        /* --- Seletor de Personagem (Modal) --- */
        #char-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 40px;
            border: 8px solid var(--morango);
            z-index: 200;
            width: 80%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .char-card {
            cursor: pointer;
            padding: 10px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .char-card:hover { background: var(--bg); }
        .char-card img { width: 80px; height: 80px; object-fit: contain; }
        .char-card p { margin: 5px 0 0; font-size: 14px; color: var(--chocolate); }

        /* --- O Jogo --- */
        #game-area {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: var(--chocolate);
        }

        /* --- Jogador --- */
        #player {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px; /* BEM MAIOR como pedido */
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transition: left 0.1s ease-out;
        }

        #player-sprite {
            width: 140px;
            height: 140px;
            object-fit: contain;
            z-index: 2;
        }

        .cone {
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-top: 70px solid var(--chocolate);
            position: absolute;
            top: 10px; /* Posicionada para a bola cair dentro */
            z-index: 1;
        }

        /* --- Bolas de Sorvete --- */
        .ice-cream-scoop {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: inset -5px -5px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>

    <div id="ui-container">
        <button class="btn btn-start" onclick="startGame()">🌸 START 🌸</button>
        <button class="btn btn-char" onclick="toggleModal(true)">✨ PERSONAGEM ✨</button>
    </div>

    <div id="char-modal">
        <h2 style="color: var(--morango);">Escolha seu Amigo!</h2>
        <div class="char-grid" id="char-list">
            </div>
        <button class="btn btn-start" style="margin-top: 20px; font-size: 18px;" onclick="toggleModal(false)">Fechar</button>
    </div>

        </div>
    </div>
